<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book your event with Go For Events">
    <title>Book Event | Go For Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .booking-form-wrapper { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-lg); border: 1px solid var(--border-color); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        
        /* Popup */
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: var(--bg-color); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-lg); text-align: center; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid var(--primary-color); }
        .popup.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .popup i { font-size: 4rem; color: #28a745; margin-bottom: 20px; display: block; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2999; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="inner-page">
    <div class="loader-wrapper" id="loader"><div class="loader"></div></div>

    <nav class="navbar sticky" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">GoFor<span>Events</span></a>
            <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
            <div class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="gallery.html">Gallery</a>
                <a href="booking.html" class="active btn btn-primary" style="color:white; padding: 8px 20px;">Book Now</a>
                <a href="contact.html">Contact</a>
                <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <header class="page-header" style="padding: 150px 0 50px; background-color: var(--card-bg); text-align: center;">
        <div class="container">
            <h1 class="hero-title reveal" style="color: var(--text-color); font-size:3rem;">Book Your Event</h1>
            <p class="section-subtitle reveal">Let's create magic together</p>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="booking-form-wrapper reveal">
                <form id="bookingForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name *</label>
                            <input type="text" id="b-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address *</label>
                            <input type="email" id="b-email" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Phone Number *</label>
                            <input type="tel" id="b-phone" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Event Type *</label>
                            <select id="b-type" class="form-control" required>
                                <option value="" disabled selected>Select Event Type</option>
                                <option value="Wedding">Wedding</option>
                                <option value="Corporate">Corporate Event</option>
                                <option value="Birthday">Birthday Party</option>
                                <option value="Concert">Concert / Festival</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Event Date *</label>
                            <input type="date" id="b-date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Expected Guest Count</label>
                            <input type="number" id="b-guests" class="form-control" min="1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Event Location/City *</label>
                        <input type="text" id="b-location" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Additional Message or Requirements</label>
                        <textarea id="b-message" class="form-control" placeholder="Tell us about your theme, preferences, etc."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; font-size:1.1rem; padding:15px;">Submit Booking Request</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Success Popup -->
    <div class="overlay" id="popup-overlay"></div>
    <div class="popup" id="success-popup">
        <i class="fas fa-check-circle"></i>
        <h2 style="margin-bottom:10px;">Booking Submitted!</h2>
        <p style="margin-bottom:20px; color:var(--text-muted);">Thank you for choosing Go For Events.<br>Our team will contact you shortly to confirm details.</p>
        <button class="btn btn-primary" id="close-popup">Close</button>
    </div>

    <!-- Footer ... -->
    <footer class="footer">
        <div class="container text-center">
            <p>&copy; <span id="year"></span> Go For Events. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // Form Logic
        const bookingForm = document.getElementById('bookingForm');
        const popup = document.getElementById('success-popup');
        const overlay = document.getElementById('popup-overlay');
        const closePopupBtn = document.getElementById('close-popup');

        bookingForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Gather Data
            const newBooking = {
                id: Date.now(),
                name: document.getElementById('b-name').value,
                email: document.getElementById('b-email').value,
                phone: document.getElementById('b-phone').value,
                type: document.getElementById('b-type').value,
                date: document.getElementById('b-date').value,
                guests: document.getElementById('b-guests').value,
                location: document.getElementById('b-location').value,
                message: document.getElementById('b-message').value,
                submittedAt: new Date().toLocaleString()
            };

            // Store in LocalStorage
            let bookings = JSON.parse(localStorage.getItem('goForEvents_bookings') || '[]');
            bookings.push(newBooking);
            localStorage.setItem('goForEvents_bookings', JSON.stringify(bookings));

            // Show Popup
            popup.classList.add('active');
            overlay.classList.add('active');
            
            // Reset Form
            bookingForm.reset();
        });

        closePopupBtn.addEventListener('click', () => {
            popup.classList.remove('active');
            overlay.classList.remove('active');
        });
        overlay.addEventListener('click', () => {
            popup.classList.remove('active');
            overlay.classList.remove('active');
        });
    </script>
</body>
</html>
