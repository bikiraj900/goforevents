<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Go For Events Admin Dashboard">
    <title>Admin Dashboard | Go For Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: var(--bg-color); }
        .admin-nav { background: var(--secondary-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .admin-nav h2 { margin: 0; font-family: var(--font-main); font-size: 1.5rem; }
        .admin-nav .btn { padding: 8px 15px; font-size: 0.9rem; }
        
        .admin-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        /* Login Card */
        #login-section { display: flex; justify-content: center; align-items: center; min-height: 70vh; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; border: 1px solid var(--border-color); text-align: center; }
        .error-msg { color: #d9534f; margin-bottom: 15px; display: none; }
        
        /* Dashboard */
        #dashboard-section { display: none; }
        .dashboard-grid { display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
        
        .sidebar { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border-color); overflow: hidden; height: fit-content; }
        .sidebar-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid var(--border-color); font-weight: 500; transition: var(--transition); display: flex; align-items: center; gap: 10px; }
        .sidebar-item:last-child { border-bottom: none; }
        .sidebar-item:hover, .sidebar-item.active { background: var(--primary-color); color: #fff; }
        
        .content-area { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border-color); padding: 30px; min-height: 500px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        
        /* Tables */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); text-align: left; }
        th { background: rgba(0,0,0,0.05); font-weight: 600; }
        [data-theme="dark"] th { background: rgba(255,255,255,0.05); }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; background: #d9534f; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-sm:hover { background: #c9302c; }
        
        .gallery-grid-admin { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item-admin { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 1; }
        .gallery-item-admin img { width: 100%; height: 100%; object-fit: cover; }
        .delete-img { position: absolute; top: 10px; right: 10px; background: rgba(217,83,79,0.9); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="inner-page">
    <div class="loader-wrapper" id="loader"><div class="loader"></div></div>

    <nav class="admin-nav" id="adminNav" style="display: none;">
        <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
        <button class="btn btn-outline" id="logoutBtn" style="color:white; border-color:white;">Logout</button>
    </nav>

    <div class="admin-container">
        <!-- Login Section -->
        <div id="login-section">
            <div class="login-card reveal">
                <h2 style="margin-bottom: 20px;">Admin Login</h2>
                <div class="error-msg" id="login-error">Invalid Username or Password</div>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" id="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
                </form>
                <p style="margin-top:20px; font-size:0.8rem; color:var(--text-muted);">Use admin / admin123</p>
                <a href="index.html" style="display:inline-block; margin-top:15px; font-size:0.9rem;"><i class="fas fa-arrow-left"></i> Back to Site</a>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="reveal">
            <h2 style="margin-bottom: 30px;">Dashboard Overview</h2>
            <div class="dashboard-grid">
                <!-- Sidebar -->
                <div class="sidebar">
                    <div class="sidebar-item active" data-target="bookings-tab">
                        <i class="fas fa-calendar-check"></i> Manage Bookings
                    </div>
                    <div class="sidebar-item" data-target="gallery-tab">
                        <i class="fas fa-images"></i> Manage Gallery
                    </div>
                </div>

                <!-- Content Area -->
                <div class="content-area">
                    <!-- Bookings Tab -->
                    <div class="tab-content active" id="bookings-tab">
                        <h3 style="margin-bottom: 20px;">Recent Bookings</h3>
                        <div class="table-responsive">
                            <table id="bookingsTable">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Name</th>
                                        <th>Event Type</th>
                                        <th>Event Date</th>
                                        <th>Location</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Gallery Tab -->
                    <div class="tab-content" id="gallery-tab">
                        <h3 style="margin-bottom: 20px;">Add New Image to Gallery</h3>
                        <form id="addGalleryForm" style="margin-bottom: 40px;">
                            <div style="display:grid; grid-template-columns: 1fr 2fr auto; gap: 15px; align-items: end;">
                                <div class="form-group" style="margin-bottom:0;">
                                    <label class="form-label">Category</label>
                                    <select id="imgCategory" class="form-control" required>
                                        <option value="wedding">Wedding</option>
                                        <option value="corporate">Corporate</option>
                                        <option value="party">Party</option>
                                    </select>
                                </div>
                                <div class="form-group" style="margin-bottom:0;">
                                    <label class="form-label">Image URL</label>
                                    <input type="url" id="imgUrl" class="form-control" placeholder="https://..." required>
                                </div>
                                <button type="submit" class="btn btn-primary">Add Image</button>
                            </div>
                        </form>
                        
                        <h3 style="margin-bottom: 20px;">Uploaded Images</h3>
                        <div class="gallery-grid-admin" id="adminGalleryGrid">
                            <!-- Populated JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('login-error');
        const adminNav = document.getElementById('adminNav');
        const logoutBtn = document.getElementById('logoutBtn');
        
        // Hardcoded Credentials
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'admin123';

        // Check Login State
        if (sessionStorage.getItem('isAdminLoggedIn')) {
            showDashboard();
        }

        // Login Submit
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            if (u === ADMIN_USER && p === ADMIN_PASS) {
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                showDashboard();
            } else {
                loginError.style.display = 'block';
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('isAdminLoggedIn');
            location.reload();
        });

        function showDashboard() {
            loginSection.style.display = 'none';
            adminNav.style.display = 'flex';
            dashboardSection.style.display = 'block';
            loadBookings();
            loadGallery();
        }

        // Tabs Logic
        const sidebarItems = document.querySelectorAll('.sidebar-item');
        const tabContents = document.querySelectorAll('.tab-content');

        sidebarItems.forEach(item => {
            item.addEventListener('click', () => {
                sidebarItems.forEach(i => i.classList.remove('active'));
                tabContents.forEach(t => t.classList.remove('active'));
                
                item.classList.add('active');
                document.getElementById(item.getAttribute('data-target')).classList.add('active');
            });
        });

        // Manage Bookings
        function loadBookings() {
            const bookings = JSON.parse(localStorage.getItem('goForEvents_bookings') || '[]');
            const tbody = document.querySelector('#bookingsTable tbody');
            tbody.innerHTML = '';
            
            if(bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No bookings found.</td></tr>';
                return;
            }

            // Descending order sort by ID
            bookings.sort((a,b) => b.id - a.id).forEach(b => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${b.submittedAt.split(',')[0]}</td>
                    <td>${b.name}<br><small><a href="mailto:${b.email}">${b.email}</a></small></td>
                    <td>${b.type}</td>
                    <td>${b.date}</td>
                    <td>${b.location}</td>
                    <td><button class="btn-sm" onclick="deleteBooking(${b.id})"><i class="fas fa-trash"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        window.deleteBooking = (id) => {
            if(confirm('Are you sure you want to delete this booking?')) {
                let bookings = JSON.parse(localStorage.getItem('goForEvents_bookings') || '[]');
                bookings = bookings.filter(b => b.id !== id);
                localStorage.setItem('goForEvents_bookings', JSON.stringify(bookings));
                loadBookings();
            }
        };

        // Manage Gallery
        const addGalleryForm = document.getElementById('addGalleryForm');
        addGalleryForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const category = document.getElementById('imgCategory').value;
            const url = document.getElementById('imgUrl').value;
            
            const newImage = { id: Date.now(), category, url };
            let images = JSON.parse(localStorage.getItem('goForEvents_gallery') || '[]');
            images.push(newImage);
            localStorage.setItem('goForEvents_gallery', JSON.stringify(images));
            
            addGalleryForm.reset();
            loadGallery();
            alert('Image added to gallery!');
        });

        function loadGallery() {
            const images = JSON.parse(localStorage.getItem('goForEvents_gallery') || '[]');
            const grid = document.getElementById('adminGalleryGrid');
            grid.innerHTML = '';
            
            if(images.length === 0) {
                grid.innerHTML = '<p class="text-muted" style="grid-column:1/-1;">No uploaded images.</p>';
                return;
            }

            images.forEach(img => {
                const div = document.createElement('div');
                div.className = 'gallery-item-admin';
                div.innerHTML = `
                    <img src="${img.url}" alt="${img.category}">
                    <button class="delete-img" onclick="deleteGalleryImage(${img.id})" title="Delete"><i class="fas fa-trash"></i></button>
                    <div style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.7); color:white; padding:5px; font-size:0.8rem; text-align:center;">${img.category}</div>
                `;
                grid.appendChild(div);
            });
        }

        window.deleteGalleryImage = (id) => {
            if(confirm('Delete this image?')) {
                let images = JSON.parse(localStorage.getItem('goForEvents_gallery') || '[]');
                images = images.filter(img => img.id !== id);
                localStorage.setItem('goForEvents_gallery', JSON.stringify(images));
                loadGallery();
            }
        };
    </script>
</body>
</html>
